<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="description" content="Student Permission Leave Management System" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PL System" />
    <meta name="application-name" content="PL System" />
    <meta name="msapplication-TileColor" content="#3b82f6" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon.svg" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icon.svg" />
    
    <!-- Favicon -->
    <link rel="shortcut icon" href="/favicon.ico" />
    
    <title>Hostel Management System</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      // Register service worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          console.log('Attempting to register service worker...');
          
          // Try multiple paths for service worker
          const swPaths = ['/sw.js', './sw.js', '../public/sw.js'];
          
          let registrationAttempt = 0;
          
          function tryNextPath() {
            if (registrationAttempt >= swPaths.length) {
              console.log('All service worker registration attempts failed');
              return;
            }
            
            const swPath = swPaths[registrationAttempt];
            console.log(`Trying service worker path: ${swPath}`);
            
            navigator.serviceWorker.register(swPath, { scope: '/' })
              .then((registration) => {
                console.log('✅ SW registered successfully with scope: ', registration.scope);
                
                // Force update if available
                if (registration.active) {
                  registration.update();
                }
                
                // Set up install prompt listener
                setupInstallPrompt();
              })
              .catch((registrationError) => {
                console.log(`❌ SW registration failed for ${swPath}:`, registrationError);
                registrationAttempt++;
                tryNextPath();
              });
          }
          
          function setupInstallPrompt() {
            // Listen for install prompt
            let deferredPrompt;
            window.addEventListener('beforeinstallprompt', (e) => {
              console.log('🎯 Install prompt event received!');
              e.preventDefault();
              deferredPrompt = e;
              
              // Show install button or trigger install
              setTimeout(() => {
                if (deferredPrompt) {
                  console.log('🚀 PWA is installable - install icon should appear in address bar');
                  
                  // Try to show install icon manually
                  if (navigator.serviceWorker.controller) {
                    console.log('Service worker is controlling the page');
                  }
                }
              }, 3000);
            });

            // Handle app installed
            window.addEventListener('appinstalled', () => {
              console.log('🎉 PWA was installed!');
              deferredPrompt = null;
            });
          }
          
          tryNextPath();
        });
      } else {
        console.log('❌ Service Worker not supported');
      }
    </script>
  </body>
</html>
